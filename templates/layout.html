<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Grāmatu dienasgrāmata</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link-red { color: #dc3545 !important; font-weight: bold; }
    </style>
</head>
<body class="bg-light">
    <div class="container bg-white shadow-sm min-vh-100 p-4">
        <h1>Mācību projekts</h1>
        <nav class="mb-4">
            <a href="/">Sākums</a> | 
            {% if session.get('user') %}
                <a href="/saraksts">Saraksts</a> | 
                <a href="/pievienot">Pievienot</a> | 
                {% if session['user'] == 'admin' %}<a href="/admin">Admin</a> | {% endif %}
                <a href="/iziet" class="nav-link-red">Iziet ({{ session['user'] }})</a>
            {% else %}
                <a href="/pieteikties">Pieteikties</a> | 
                <a href="/registreties">Reģistrēties</a>
            {% endif %}
        </nav>
        <hr>
        {% block content %}{% endblock %}
        <hr>
        <footer class="text-muted small">2026. gads - 12.a klase</footer>
    </div>
</body>
</html>
