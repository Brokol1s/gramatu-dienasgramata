{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h3>Pieteikšanās 🔐</h3>
        <form method="POST">
            <div class="mb-3">
                <label>Lietotājvārds</label>
                <input type="text" name="username" class="form-control" placeholder="Ievadi lietotājvārdu" required>
            </div>
            <div class="mb-3">
                <label>Parole</label>
                <input type="password" name="password" class="form-control" placeholder="Ievadi paroli" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Ienākt</button>
        </form>
    </div>
</div>
{% endblock %}
