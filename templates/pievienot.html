{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 border p-4 rounded bg-white shadow-sm">
        <h2 class="text-center mb-4">Pievienot grāmatu 📚</h2>
        <form action="/pievienot" method="POST">
            <div class="mb-3">
                <label class="form-label">Nosaukums</label>
                <input type="text" name="nosaukums" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Lapas</label>
                <input type="number" name="lapas" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Vērtējums (1-10)</label>
                <input type="number" name="vertejums" min="1" max="10" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Saglabāt</button>
        </form>
    </div>
</div>
{% endblock %}
