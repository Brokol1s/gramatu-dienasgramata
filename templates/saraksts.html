{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Mani grāmatu saraksti 📚</h2>
    <a href="/pievienot" class="btn btn-success">+ Pievienot jaunu</a>
</div>

<table class="table table-hover">
    <thead class="table-primary">
        <tr>
            <th>Nosaukums</th>
            <th>Lappuses</th>
            <th>Vērtējums</th>
        </tr>
    </thead>
    <tbody>
        <tbody>
    {% for book in books %}
    <tr>
        <td><strong>{{ book.nosaukums }}</strong></td>
        <td>{{ book.lapas }}</td>
        <td>
            <span class="badge bg-warning text-dark">
                ⭐ {{ book.vertejums if book.vertejums else '0' }}/10
            </span>
        </td>
    </tr>
    {% endfor %}
</tbody>
</table>
{% endblock %}
