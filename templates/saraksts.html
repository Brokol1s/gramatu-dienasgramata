<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mani grāmatu saraksti</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            width: 350px;
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .book-item {
            border: 1px solid #000;
            padding: 10px;
            margin-bottom: 15px;
        }
        .field {
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }
        .label {
            font-weight: bold;
        }
        .btn-add {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #333;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            color: black;
            font-size: 0.9rem;
        }
        .btn-add:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mani grāmatu saraksti 📚</h2>

    <!-- Paraugs vienai grāmatai sarakstā -->
    <div class="book-item">
        <div class="field">
            <span class="label">Nosaukums:</span> [Grāmatas nosaukums]
        </div>
        <div class="field">
            <span class="label">Lappušu skaits:</span> [Skaits]
        </div>
        <div class="field">
            <span class="label">Novērtējums ⭐:</span> [1-10]
        </div>
    </div>


    <a href="pievienot.html" class="btn-add">Pievienot jaunu grāmatu</a>
</div>

</body>
</html>
